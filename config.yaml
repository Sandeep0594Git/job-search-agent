# ============================================================
# Job Search Agent - configuration
# Edit this file to change what the agent looks for.
# ============================================================

search:
  # Each term is searched separately on every portal.
  terms:
    - "Presales Consultant"
    - "Solution Consultant"
    - "Solutions Engineer"
    - "Solution Architect"
    - "Cloud Consultant"
    - "Managed Services Consultant"
    - "Delivery Manager"
    - "Engagement Manager"
    - "Technical Program Manager"

  # Portals to search. Supported: linkedin, indeed, naukri, glassdoor
  sites:
    - linkedin
    - indeed
    - naukri

  # Locations searched one by one. "India" alone covers all metros + remote
  # on these portals. Every extra location multiplies runtime (terms x
  # locations x portals), so only add metros if results feel thin.
  locations:
    - "India"
    # - "Bengaluru"
    # - "Hyderabad"
    # - "Pune"
    # - "Mumbai"
    # - "Delhi NCR"
    # - "Chennai"

  country_indeed: "india"

  # Adzuna (official API, aggregates company career portals + boards).
  # Activates automatically once ADZUNA_APP_ID / ADZUNA_APP_KEY secrets exist.
  # Free key: https://developer.adzuna.com
  adzuna:
    country: "in"
    where: "India"
    # one API call per cycle; matches jobs containing ANY of these words
    what_or: "presales solution consultant architect cloud managed delivery engagement program"
    max_days_old: 1
    results: 50

  # Only jobs posted within this many hours (keeps each run fast and fresh).
  lookback_hours: 6

  # Max results requested per term per location.
  results_per_search: 10

  # Include remote jobs (user is flexible: office / hybrid / remote, any shift)
  include_remote: true

filters:
  # TITLE GATE (the important one): the job title itself must contain at
  # least one of these, otherwise the job is dropped. This is what keeps
  # loosely-related portal results (Analyst, Sales Executive...) out.
  # Leave empty [] to disable.
  title_any_keywords:
    - presales
    - pre-sales
    - pre sales
    - solution          # Solution(s) Consultant / Engineer / Architect
    - cloud
    - managed services
    - delivery manager
    - delivery lead
    - engagement manager
    - program manager
    - technical account manager
    - architect
    - bid manager
    - finops

  # Secondary check on title+description (any match passes). Catches e.g.
  # an "Architect" title that has nothing to do with cloud/IT.
  any_keywords:
    - presales
    - pre-sales
    - solution
    - cloud
    - gcp
    - google cloud
    - aws
    - azure
    - managed services
    - msp
    - delivery
    - engagement manager
    - program manager
    - sre
    - finops

  # A job is dropped if ANY of these appear in the title. NOTE: these are
  # substring matches - never add plain "sales" here or anything like
  # "sales executive", because "preSALES EXECUTIVE" contains it too.
  exclude_title_keywords:
    - intern
    - fresher
    - trainee
    - analyst
    - inside sales
    - field sales
    - business development
    - telesales
    - telecaller
    - bpo

notify:
  # Max individual Telegram job alerts per run (rest are summarized).
  max_telegram_alerts_per_run: 12
  # WhatsApp (CallMeBot) gets one compact digest per run, not per-job spam.
  whatsapp_digest: true

tailor:
  # Gemini model used for JD analysis + resume tailoring (free tier).
  model: "gemini-2.5-flash"
  # Folder scanned for your baseline resume (.pdf / .docx / .md / .txt).
  resume_dir: "resume"
  output_dir: "output"
